<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calculator-grid">
    <div class="output">
        <div data-previous-operand class="previous-operand"></div>
        <div data-current-operand class="current-operand">0</div>
    </div>
    <button data-all-clear class="span-two action-btn">AC</button>
    <button data-delete class="action-btn">DEL</button>
    <button data-operation class="operator-btn">÷</button>
    <button data-number>7</button>
    <button data-number>8</button>
    <button data-number>9</button>
    <button data-operation class="operator-btn">×</button>
    <button data-number>4</button>
    <button data-number>5</button>
    <button data-number>6</button>
    <button data-operation class="operator-btn">-</button>
    <button data-number>1</button>
    <button data-number>2</button>
    <button data-number>3</button>
    <button data-operation class="operator-btn">+</button>
    <button data-number class="span-two">0</button>
    <button data-number>.</button>
    <button data-equals class="operator-btn equals-btn">=</button>
</div>
<script src="script.js"></script>
</body>
</html>
